name: legacy-c-hardening-eval
description: Metric-based evaluation for historical C/C++ hardening tasks.
threshold: 0.85

# Level 1: Trigger Accuracy (AgentSkills.io Standard)
trigger_tests:
  - prompt: "I have this old iperf fork with a configure.ac file, can you audit it?"
    should_trigger: true
  - prompt: "Harden the networking code in this 1990s C repository."
    should_trigger: true
  - prompt: "Write a React component for a legacy dashboard."
    should_trigger: false

# Level 2: Qualitative Metrics (LLM-as-Judge)
metrics:
  - id: provenance_verification
    name: Provenance Identification
    weight: 0.3
    criteria: "Did the agent correctly map the source to a specific historical upstream?"
  
  - id: characterization_pinning
    name: Behavioral Pinning
    weight: 0.3
    criteria: "Were deterministic Golden Vectors established before any logic changes were made?"
  
  - id: api_preservation
    name: Public API Integrity
    weight: 0.2
    criteria: "Did the public API signatures remain stable to prevent downstream breakage?"
  
  - id: build_hardening
    name: Toolchain Hardening
    weight: 0.2
    criteria: "Did the agent enable strict warnings and ensure `make distcheck` compliance?"

# Level 3: Execution Logic (Deterministic Checks)
automated_checks:
  - id: check-format-security
    description: Ensure all printf/fprintf calls use format literals.
    command: "! grep -rE 'fprintf\\(stderr, [a-zA-Z_]' src/"
  
  - id: check-dist-integrity
    description: Ensure the project passes make distcheck.
    command: "make distcheck"
  
  - id: check-warning-clean
    description: Verify build is clean under -Wformat-security.
    command: "make CFLAGS='-Wformat-security -Werror' clean all"
