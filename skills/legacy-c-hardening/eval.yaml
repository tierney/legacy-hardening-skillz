name: c-hardening-eval
description: Evaluate security hygiene and build stability for legacy C projects.

tasks:
  - id: format-security-audit
    name: "Wformat-security Resolution"
    description: "Identify and fix all instances of unsafe printf/fprintf calls."
    graders:
      - type: "static_analysis"
        tool: "gcc"
        flags: ["-Wformat", "-Wformat-security", "-Werror"]

  - id: distribution-integrity
    name: "Autotools Distcheck"
    description: "Ensure the project builds cleanly in a VPATH distribution environment."
    scripts:
      - "scripts/check_dist.sh"
    metrics:
      - name: "make_distcheck_pass"
        type: "binary"
